name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @stack-decay/shared build

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @stack-decay/shared build

      - name: Run server tests
        run: pnpm --filter @stack-decay/server test
        env:
          MONGODB_URI: mongodb://localhost:27017/stack-decay-test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-jwt-secret-for-ci-minimum-32-chars
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
          GITHUB_CLIENT_ID: test-client-id
          GITHUB_CLIENT_SECRET: test-client-secret
          GITHUB_CALLBACK_URL: http://localhost:4000/api/auth/github/callback
          NODE_ENV: test
          PORT: 4000
          CLIENT_URL: http://localhost:5173

  test-client:
    name: Client Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @stack-decay/shared build

      - name: Run client tests
        run: pnpm --filter @stack-decay/client test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-server, test-client]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Upload client build
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: packages/client/dist/
          retention-days: 7

      - name: Upload server build
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: packages/server/dist/
          retention-days: 7
