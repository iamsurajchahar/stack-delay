services:
  - type: web
    name: stack-decay-api
    runtime: node
    plan: free
    buildCommand: npx -y pnpm@9.15.9 install --frozen-lockfile --prod=false && npx -y pnpm@9.15.9 --filter @stack-decay/shared build && npx -y pnpm@9.15.9 --filter @stack-decay/server build
    startCommand: node packages/server/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: START_WORKERS
        value: "true"
      - key: CLIENT_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_CALLBACK_URL
        sync: false
      - key: LIBRARIES_IO_API_KEY
        sync: false
      - key: NVD_API_KEY
        sync: false
